    <script>

    name: "Warung Selera KL",
    hours: "Daily: 11:00 AM - 10:00 PM\nFriday: 11:00 AM - 11:00 PM",
    address: "15 Jalan Bangsar, 59000 KL",
    phone: "03-2345 6789",
    whatsapp: "019-222 3333",
};

const menu = {
    mains: [
        ["Nasi Lemak Special", "RM 12.90"],
        ["Nasi Goreng Kampung", "RM 10.90"],
        ["Mee Goreng Mamak", "RM 9.90"],
        ["Char Kuey Teow", "RM 11.90"],
        ["Roti Canai Set (2pcs + dhal)", "RM 5.90"],
        ["Chicken Rice", "RM 10.90"],
        ["Laksa Penang", "RM 11.90"],
        ["Satay (10 sticks)", "RM 15.90"],
    ],
    drinks: [
        ["Teh Tarik", "RM 3.50"],
        ["Kopi O", "RM 3.00"],
        ["Milo Dinosaur", "RM 5.90"],
        ["Fresh Coconut", "RM 6.90"],
        ["Sirap Bandung", "RM 4.50"],
        ["Air Limau", "RM 3.50"],
    ],
    desserts: [
        ["Cendol", "RM 5.90"],
        ["ABC (Ais Batu Campur)", "RM 6.90"],
        ["Roti Bakar", "RM 4.50"],
    ]

function respond(msg) {
    const m = msg.toLowerCase();
    if (/^(hi|hello|hey|hai|halo|yo|sup)/i.test(m))
        return `≡Óì╜∩╕Â Welcome to ${R.name}! Authentic Malaysian flavors!\n\nHow can I help?\n\n1∩╕ÂΓâú See our menu\n2∩╕ÂΓâú Place an order (delivery/pickup)\n3∩╕ÂΓâú Reserve a table\n4∩╕ÂΓâú Hours & location\n5∩╕ÂΓâú Catering inquiry\n6∩╕ÂΓâú Talk to our team\n\nType a number or just ask! ≡ÓÌÍ`;
    if (/menu|food|eat|makan|what.*have|^1$/i.test(m))
        return `≡ÓôÍ OUR MENU\n\n≡Óì¢ *Mains:*\n${menu.mains.map(([i,p]) => `  ΓÇó ${i} ΓÇõ ${p}`).join('\n')}\n\n≡ÓÑñ *Drinks:*\n${menu.drinks.map(([i,p]) => `  ΓÇó ${i} ΓÇõ ${p}`).join('\n')}\n\n≡Óì¿ *Desserts:*\n${menu.desserts.map(([i,p]) => `  ΓÇó ${i} ΓÇõ ${p}`).join('\n')}\n\n≡ÓÂ╖∩╕Â *Today's Special:* Nasi Lemak + Teh Tarik = RM 14.90 (save RM1.50!)\n\nReady to order? ≡ÓÌÍ`;
    if (/order|delivery|pickup|takeaway|bungkus|^2$/i.test(m))
        return `≡Óôª Let's get your order sorted!\n\n≡ÓÜù *Delivery:* Within 5km, RM5 flat fee\n≡ÓÂ¬ *Self-pickup:* Ready in 15-20 min\n\nJust tell me:\n1. What you'd like to order\n2. Delivery or pickup?\n3. Your address (if delivery)\n\nMin order for delivery: RM25`;
    if (/reserve|table|book|seat|^3$/i.test(m))
        return `≡Ó¬À Table Reservation!\n\nPlease share:\nΓÇó Date & time\nΓÇó Number of guests\nΓÇó Any special requests (birthday, kids seat, etc.)\n\nWe have:\n  ΓÇó Indoor AC seating (40 pax)\n  ΓÇó Outdoor garden area (20 pax)\n  ΓÇó Private room (up to 15 pax, min spend RM300)\n\nWeekend dinner (Fri-Sun 7-9PM) ΓÇõ book early! ≡ÓõÑ`;
    if (/hour|open|close|location|address|where|^4$/i.test(m))
        return `≡Óôì ${R.name}\n\n${R.address}\n≡ÓòÉ ${R.hours}\n≡Óô₧ ${R.phone}\n≡ÓÈ¼ WhatsApp: ${R.whatsapp}\n\n≡Óà┐∩╕Â Parking at Bangsar Village (5 min walk)\n≡ÓÜç LRT Bangsar station (3 min walk)\n\nSee you soon! ≡ÓÌÍ`;
    if (/catering|event|party|corporate|^5$/i.test(m))
        return `≡ÓÃÊ Catering & Events!\n\nWe cater for:\n  ΓÇó Corporate lunches (min 20 pax)\n  ΓÇó Birthday parties\n  ΓÇó Kenduri / gatherings\n  ΓÇó Office events\n\n≡ÓôÍ Packages from RM15/pax\n\nTell me:\nΓÇó Event date\nΓÇó Number of guests\nΓÇó Budget range\nΓÇó Any dietary needs\n\nWe'll prepare a custom quote within 24 hours!`;
    if (/human|staff|person|^6$/i.test(m))
        return `≡Óô₧ Call: ${R.phone}\n≡ÓÈ¼ WhatsApp: ${R.whatsapp}\n\nOur team responds within 5 minutes during business hours!`;
    if (/halal|pork|alcohol/i.test(m))
        return `ΓÌ¬∩╕Â Yes! We are 100% HALAL certified by JAKIM.\n\nNo pork, no alcohol. All ingredients halal-sourced.\n\nJAKIM cert no: displayed at our entrance ≡ÓÕÂ`;
    if (/vegetarian|vegan|diet/i.test(m))
        return `≡ÓÑ¼ Vegetarian options:\n  ΓÇó Roti Canai (plain/egg)\n  ΓÇó Mee Goreng (can make without meat)\n  ΓÇó Fresh coconut\n  ΓÇó Cendol\n\nJust let us know when ordering ΓÇõ we'll customize! ≡ÓÌè`;
    if (/nasi lemak|best seller|popular|recommend/i.test(m))
        return `Γ¡É Our MUST-TRY:\n\n1. ≡ÓÂÁ Nasi Lemak Special ΓÇõ RM12.90\n   Sambal tumis, ayam goreng berempah, telur, ikan bilis, timun, kacang\n\n2. ≡ÓõÑ Satay (10 sticks) ΓÇõ RM15.90\n   Charcoal-grilled, served with kuah kacang & nasi impit\n\n3. ≡Óì£ Laksa Penang ΓÇõ RM11.90\n   Authentic recipe, fresh ingredients daily\n\n4.9Γ¡É on Google Reviews (500+ reviews)\n\nWant to order? ≡ÓÌÍ`;
    if (/thank|thanks|terima kasih|tq/i.test(m))
        return `≡ÓÕÂ Terima kasih! Hope to see you soon!\n\nDon't forget: Nasi Lemak + Teh Tarik combo only RM14.90! ≡ÓÌÍ`;
    return `Here's what I can help with:\n\n1∩╕ÂΓâú See our menu\n2∩╕ÂΓâú Place an order\n3∩╕ÂΓâú Reserve a table\n4∩╕ÂΓâú Hours & location\n5∩╕ÂΓâú Catering inquiry\n6∩╕ÂΓâú Talk to our team\n\nJust type a number or ask! ≡ÓÌÍ`;
}

function addMsg(text, cls) {
    const chat = document.getElementById('chat');
    const now = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    const div = document.createElement('div');
    div.className = `message ${cls}`;
    div.innerHTML = text + `<div class="time">${now}</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

window.onload = () => addMsg(respond('hi'), 'bot');

function sendMessage() {
    const input = document.getElementById('userInput');
    const msg = input.value.trim();
    if (!msg) return;
    addMsg(msg, 'user');
    input.value = '';
    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.textContent = 'typing...';
    document.getElementById('chat').appendChild(typing);
    setTimeout(() => { typing.remove(); addMsg(respond(msg), 'bot'); }, 500 + Math.random() * 700);
}
    </script>
