<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hair Salon AI Chatbot Demo — Phyto Link Venture</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0b141a; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 420px; height: 90vh; max-height: 700px; display: flex; flex-direction: column; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .header { background: #1f2c33; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
        .header .avatar { width: 40px; height: 40px; border-radius: 50%; background: #e91e63; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; }
        .header .info h3 { color: #e9edef; font-size: 16px; }
        .header .info p { color: #8696a0; font-size: 12px; }
        .chat { flex: 1; overflow-y: auto; padding: 16px; background: #0b141a; }
        .message { max-width: 85%; margin-bottom: 8px; padding: 8px 12px; border-radius: 8px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
        .bot { background: #1f2c33; color: #e9edef; border-top-left-radius: 0; margin-right: auto; }
        .user { background: #005c4b; color: #e9edef; border-top-right-radius: 0; margin-left: auto; }
        .time { font-size: 11px; color: #8696a0; text-align: right; margin-top: 4px; }
        .input-area { background: #1f2c33; padding: 10px 16px; display: flex; gap: 8px; }
        .input-area input { flex: 1; background: #2a3942; border: none; border-radius: 8px; padding: 10px 16px; color: #e9edef; font-size: 14px; outline: none; }
        .input-area input::placeholder { color: #8696a0; }
        .input-area button { background: #00a884; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; color: white; }
        .badge { background: #e91e63; color: white; text-align: center; padding: 8px; font-size: 12px; }
        .badge a { color: white; text-decoration: none; font-weight: bold; }
        .typing { color: #8696a0; font-style: italic; font-size: 13px; padding: 4px 12px; margin-bottom: 8px; }
        .cta-banner { background: linear-gradient(135deg, #e91e63, #9c27b0); color: white; text-align: center; padding: 12px; font-size: 13px; }
        .cta-banner a { color: #fff; font-weight: bold; text-decoration: underline; }
        .demos { background: #1a1a2e; padding: 8px; text-align: center; font-size: 12px; }
        .demos a { color: #8696a0; text-decoration: none; margin: 0 8px; }
        .demos a:hover { color: #e9edef; }
        .demos a.active { color: #e91e63; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="cta-banner">
            💇 Want this for YOUR salon? <a href="mailto:phytolinkventure@gmail.com?subject=Salon%20AI%20Chatbot%20Inquiry">Get Started — from RM199/month</a>
        </div>
        <div class="demos">
            <a href="index.html">🦷 Dental</a> |
            <a href="salon-demo.html" class="active">💇 Salon</a> |
            <a href="restaurant-demo.html">🍽️ Restaurant</a>
        </div>
        <div class="header">
            <div class="avatar">💇</div>
            <div class="info">
                <h3>Glow Studio Hair & Beauty</h3>
                <p>🤖 AI Assistant • Book Anytime</p>
            </div>
        </div>
        <div class="chat" id="chat"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendMessage()">
            <button onclick="sendMessage()">➤</button>
        </div>
        <div class="badge">⚡ Powered by <a href="mailto:phytolinkventure@gmail.com">Phyto Link Venture</a> — AI WhatsApp Automation</div>
    </div>
    <script>
const SALON = {
    name: "Glow Studio Hair & Beauty",
    hours: "Tue-Sat: 10:00 AM - 8:00 PM\nSun: 10:00 AM - 6:00 PM\nMon: Closed",
    address: "88 Jalan SS15/4, Subang Jaya, Selangor",
    phone: "03-5678 1234",
    whatsapp: "017-888 9999",
};

const services = {
    hair: [
        ["Haircut (Ladies)", "RM 45 - 80"],
        ["Haircut (Men)", "RM 25 - 40"],
        ["Hair Wash & Blow", "RM 30 - 50"],
        ["Hair Coloring", "RM 150 - 350"],
        ["Highlights / Balayage", "RM 250 - 500"],
        ["Keratin Treatment", "RM 300 - 600"],
        ["Hair Rebonding", "RM 200 - 450"],
        ["Perm / Digital Perm", "RM 200 - 400"],
        ["Scalp Treatment", "RM 80 - 150"],
    ],
    beauty: [
        ["Manicure", "RM 35 - 60"],
        ["Pedicure", "RM 45 - 70"],
        ["Gel Nails", "RM 60 - 120"],
        ["Facial Treatment", "RM 80 - 200"],
        ["Eyebrow Threading", "RM 15"],
        ["Eyelash Extension", "RM 80 - 180"],
        ["Waxing (various)", "RM 20 - 100"],
    ]
};

const stylists = [
    "Lily — Senior Stylist (10 yrs exp, coloring specialist)",
    "Jason — Creative Director (balayage, Korean style)",
    "Amy — Nail & Beauty Artist",
    "Siti — Junior Stylist (ladies cuts, blowouts)",
];

function getSlots() {
    const slots = [];
    const d = new Date();
    for (let i = 1; i <= 7; i++) {
        const date = new Date(d.getTime() + i * 86400000);
        const day = date.getDay();
        const label = date.toLocaleDateString('en-MY', {weekday:'long', day:'numeric', month:'long'});
        if (day >= 2 && day <= 6) [10,11,13,14,15,16,17,18,19].forEach(h => slots.push(`${label} at ${h}:00`));
        else if (day === 0) [10,11,13,14,15].forEach(h => slots.push(`${label} at ${h}:00`));
    }
    return slots.slice(0, 6);
}

function respond(msg) {
    const m = msg.toLowerCase();
    if (/^(hi|hello|hey|hai|halo|yo|sup)/i.test(m))
        return `✨ Hi there! Welcome to ${SALON.name}!\n\nHow can I help you today?\n\n1️⃣ Book an appointment\n2️⃣ Hair services & pricing\n3️⃣ Beauty services & pricing\n4️⃣ Our stylists\n5️⃣ Hours & location\n6️⃣ Talk to our team\n\nJust type a number or ask anything! 💕`;
    if (/book|appointment|schedule|slot|available|^1$/i.test(m))
        return `📅 Let's book your session!\n\nNext available slots:\n${getSlots().map(s => `  • ${s}`).join('\n')}\n\nWhich slot works? I'll also need:\n• Your name\n• Service you'd like\n• Preferred stylist (optional)`;
    if (/hair|cut|color|rebond|perm|keratin|^2$/i.test(m))
        return `💇 Hair Services & Pricing:\n\n${services.hair.map(([s,p]) => `  • ${s}: ${p}`).join('\n')}\n\n*Prices vary by hair length/thickness.*\n\nWant to book? Just say the word! ✨`;
    if (/nail|beauty|facial|wax|lash|mani|pedi|^3$/i.test(m))
        return `💅 Beauty Services & Pricing:\n\n${services.beauty.map(([s,p]) => `  • ${s}: ${p}`).join('\n')}\n\n*Ask about our combo packages!*\n\nWant to book? 💕`;
    if (/stylist|who|team|staff|^4$/i.test(m))
        return `👩‍🎨 Our Team:\n\n${stylists.map(s => `  • ${s}`).join('\n')}\n\nWant to book with a specific stylist? 😊`;
    if (/hour|open|close|time|location|address|where|^5$/i.test(m))
        return `📍 ${SALON.name}\n\n${SALON.address}\n🕐 ${SALON.hours}\n📞 ${SALON.phone}\n💬 WhatsApp: ${SALON.whatsapp}\n\n🅿️ Free street parking along SS15\n\nReady to book? 💕`;
    if (/human|staff|person|real|speak|^6$/i.test(m))
        return `📞 Connecting you!\n\nCall: ${SALON.phone}\nWhatsApp: ${SALON.whatsapp}\n\nWe respond within 5 minutes during business hours ✨`;
    if (/price|cost|how much|berapa|package|promo/i.test(m))
        return `💰 Quick overview:\n\n💇 *Hair:*\n  • Cuts from RM25\n  • Coloring from RM150\n  • Treatments from RM80\n\n💅 *Beauty:*\n  • Nails from RM35\n  • Facial from RM80\n  • Lash extensions from RM80\n\nType "hair" or "beauty" for full pricing!\n\n🎉 *This month:* 15% off first visit!`;
    if (/thank|thanks|terima kasih|tq/i.test(m))
        return `💕 You're welcome! See you soon!\n\nDon't forget: 15% off for first-time visitors! ✨`;
    if (/parking|park/i.test(m))
        return `🅿️ Free street parking along Jalan SS15/4. The shop is right next to 7-Eleven — easy to spot!`;
    return `I can help with that! Here's what I do:\n\n1️⃣ Book an appointment\n2️⃣ Hair services & pricing\n3️⃣ Beauty services & pricing\n4️⃣ Our stylists\n5️⃣ Hours & location\n6️⃣ Talk to our team\n\nJust type a number or ask! ✨`;
}

function addMsg(text, cls) {
    const chat = document.getElementById('chat');
    const now = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    const div = document.createElement('div');
    div.className = `message ${cls}`;
    div.innerHTML = text + `<div class="time">${now}</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

window.onload = () => addMsg(respond('hi'), 'bot');

function sendMessage() {
    const input = document.getElementById('userInput');
    const msg = input.value.trim();
    if (!msg) return;
    addMsg(msg, 'user');
    input.value = '';
    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.id = 'typing';
    typing.textContent = 'typing...';
    document.getElementById('chat').appendChild(typing);
    setTimeout(() => { typing.remove(); addMsg(respond(msg), 'bot'); }, 500 + Math.random() * 700);
}
    </script>
</body>
</html>
